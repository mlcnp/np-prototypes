document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');

    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

IBM Plex Mono',monospace; font-size:12px; letter-spacing:0.04em; color:rgb(140,142,148); margin-bottom:14px;\">Oct 14, 2024 · Toronto<\u002Fdiv>\n      <h1 style=\"font-family:'DM Sans',sans-serif; font-weight:600; font-size:46px; line-height:1.08; letter-spacing:-0.02em; margin:0 0 18px;\">Protests over plan to close Riverdale rec centre<\u002Fh1>\n      <div style=\"font-size:15px; color:rgb(101,103,107); margin-bottom:28px;\">by Laura Fraser<\u002Fdiv>\n      <div style=\"position:relative; height:340px; border-radius:12px; overflow:hidden; background:rgb(232,233,235); box-shadow:inset 0 0 0 1px rgb(225,225,225); display:flex; align-items:center; justify-content:center; margin-bottom:8px;\">\n        <svg width=\"52\" height=\"52\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\"><rect x=\"3\" y=\"5\" width=\"18\" height=\"14\" rx=\"2\" stroke=\"rgb(170,172,176)\" stroke-width=\"1.5\"><\u002Frect><circle cx=\"8.5\" cy=\"10\" r=\"1.8\" fill=\"rgb(170,172,176)\"><\u002Fcircle><path d=\"M5 18l4.5-5 3 3 3-3.5L19 18\" stroke=\"rgb(170,172,176)\" stroke-width=\"1.5\" fill=\"none\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n      <\u002Fdiv>\n      <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:rgb(140,142,148); margin-bottom:32px;\">Residents gathered outside the centre on Saturday morning.<\u002Fdiv>\n\n      <p style=\"font-size:17px; line-height:1.62; margin:0 0 22px; color:rgb(28,28,30);\">Dozens of residents gathered outside the Riverdale community recreation centre on Saturday, protesting a city proposal that would shutter the 41-year-old facility next spring. The building houses the only public pool, after-school program and seniors' lunch in the east-end neighbourhood.<\u002Fp>\n      <p style=\"font-size:17px; line-height:1.62; margin:0 0 22px; color:rgb(28,28,30);\">City staff say the roof and mechanical systems are at the end of their life and that repairs would cost an estimated $14 million. Councillors are due to vote on the closure in November, and have asked residents to weigh in before then.<\u002Fp>\n\n      <!-- EMBEDDED CONVERSATION TEASER -->\n\n      <!-- STYLE A: jasper conversation card -->\n      <sc-if value=\"{{ teaserA }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"background:rgb(254,247,242); border-radius:24px; padding:36px 38px; display:grid; grid-template-columns:1fr 1fr; gap:36px; align-items:stretch; margin:12px 0 34px;\">\n        <div style=\"display:flex; flex-direction:column;\">\n          <div style=\"display:flex; gap:10px; margin-bottom:20px;\">\n            <span style=\"display:inline-flex; align-items:center; gap:7px; background:#fff; box-shadow:inset 0 0 0 1px rgb(238,228,221); border-radius:100px; padding:7px 14px; font-family:'IBM Plex Sans',sans-serif; font-size:14px; font-weight:500; color:rgb(20,20,20);\"><svg width=\"14\" height=\"14\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\"><path d=\"M12 2C8.13 2 5 5.13 5 9c0 4.87 7 13 7 13s7-8.13 7-13c0-3.87-3.13-7-7-7z\" fill=\"rgb(216,35,90)\"><\u002Fpath><\u002Fsvg>Local<\u002Fspan>\n            <span style=\"display:inline-flex; align-items:center; gap:7px; background:#fff; box-shadow:inset 0 0 0 1px rgb(238,228,221); border-radius:100px; padding:7px 14px; font-family:'IBM Plex Sans',sans-serif; font-size:14px; font-weight:500; color:rgb(20,20,20);\"><svg width=\"14\" height=\"14\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\"><path d=\"M4 21V8l5-3v4l5-3v5h6v10z\" fill=\"rgb(90,30,245)\"><\u002Fpath><\u002Fsvg>Toronto<\u002Fspan>\n          <\u002Fdiv>\n          <h3 style=\"font-family:'IBM Plex Sans',sans-serif; font-weight:700; font-size:38px; line-height:1.08; letter-spacing:-0.018em; margin:0 0 22px; color:rgb(15,15,15);\">How can we save the Riverdale rec centre?<\u002Fh3>\n          <div style=\"display:flex; align-items:center; gap:11px; margin-bottom:28px;\">\n            <svg width=\"22\" height=\"22\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\"><circle cx=\"9\" cy=\"8\" r=\"3 :2px solid #fff;\"><\u002Fdiv><\u002Fdiv>\n            <div style=\"background:#fff; border-radius:100px; padding:4px 12px; box-shadow:0 2px 8px rgba(0,0,0,0.14); font-family:'IBM Plex Sans',sans-serif; font-size:13px; font-weight:600; display:flex; align-items:center; gap:5px;\">Alexander<svg width=\"13\" height=\"13\" sc-camel-view-box=\"0 0 30 30\" fill=\"rgb(221,0,0)\"><circle cx=\"15\" cy=\"15\" r=\"15\"><\u002Fcircle><\u002Fsvg><\u002Fdiv>\n            <div style=\"display:flex; align-items:center; gap:6px; font-family:'IBM Plex Sans',sans-serif; font-size:12px; color:rgb(40,40,44);\"><span style=\"width:7px; height:7px; border-radius:50%; background:rgb(221,0,0);\"><\u002Fspan>Reporting live<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <p style=\"font-size:17px; line-height:1.62; margin:0 0 22px; color:rgb(28,28,30);\">Local groups have floated alternatives, including a phased renovation and a community land trust that would let residents help manage the building. Councillor Maria Chen says all options remain on the table ahead of the vote.<\u002Fp>\n      <p style=\"font-size:17px; line-height:1.62; margin:0 0 22px; color:rgb(28,28,30);\">\"This is the heart of our neighbourhood,\" said longtime member Joan Pereira. \"You don't replace 41 years of community with a line item.\"<\u002Fp>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ============ SCREEN: BROWSE (LIST + MAP) ============ -->\n    <sc-if value=\"{{ isBrowse }}\" hint-placeholder-val=\"{{ false }}\">\n    <div class=\"lc-screen\" data-screen-label=\"Browse map\" style=\"display:grid; grid-template-columns:minmax(540px,1.04fr) 1fr; height:calc(100vh - 120px);\">\n\n      <!-- LEFT COLUMN -->\n      <div class=\"lc-scroll\" style=\"overflow-y:auto; padding:28px 40px 48px;\">\n        <button sc-camel-on-click=\"{{ goArticle }}\" style=\"display:inline-flex; align-items:center; gap:6px; background:none; border:none; cursor:pointer; padding: 0; cursor:pointer;\">{{ cat.label }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <!-- filter status -->\n        <sc-if value=\"{{ isFiltered }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:18px;\">\n            <span style=\"font-family:'IBM Plex Sans',sans-serif; font-size:14px; color:rgb(101,103,107);\">{{ filterLabel }}<\u002Fspan>\n            <button sc-camel-on-click=\"{{ clearFilter }}\" style=\"display:inline-flex; align-items:center; gap:6px; background:rgb(236,236,255); color:rgb(90,30,245); border:none; border-radius:100px; padding:4px 7px 4px 12px; font-family:'IBM Plex Mono',monospace; font-size:12px; cursor:pointer;\">Clear<span style=\"display:inline-flex; align-items:center; justify-content:center; width:16px; height:16px; border-radius:50%; background:rgb(90,30,245); color:#fff; font-size:10px; line-height:1;\">×<\u002Fspan><\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- card grid -->\n        <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:28px 24px;\">\n          <sc-for list=\"{{ cards }}\" as=\"c\" hint-placeholder-count=\"6\">\n            <div sc-camel-on-click=\"{{ c.open }}\" sc-camel-on-mouse-enter=\"{{ c.hover }}\" sc-camel-on-mouse-leave=\"{{ clearHover }}\" style=\"cursor:pointer; display:flex; flex-direction:column; gap:11px;\" style-hover=\"transform:translateY(-2px);\">\n              <div style=\"position:relative; height:152px; border-radius:12px; background:{{ c.color }}; box-shadow:inset 0 0 0 1px rgba(0,0,0,0.06); display:flex; align-items:flex-end; padding:12px;\">\n                <span style=\"background:rgba(0,0,0,0.42); color:#fff; border-radius:100px; padding:3px 10px; font-family:'IBM Plex Mono',monospace; font-size:10px;\">{{ c.tag }}<\u002Fspan>\n                <svg width=\"30\" height=\"30\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" style=\"position:absolute; top:12px; right:12px; opacity:0.5;\"><rect x=\"3\" y=\"5\" width=\"18\" height=\"14\" rx=\"2\" stroke=\"#fff\" stroke-width=\"1.4\"><\u002Frect><circle cx=\"8.5\" cy=\"10\" r=\"1.6\" fill=\"#fff\"><\u002Fcircle><path d=\"M5 18l4.5-5 3 3 3-3.5L19 18\" stroke=\"#fff\" stroke-width=\"1.4\" fill=\"none\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n              <\u002Fdiv>\n              <div style=\"font-family:'IBM Plex Sans',sans-serif; font-size:17px; font-weight:600; line-height:1.26; color:rgb(20,20,20);\">{{ c.title }}<\u002Fdiv>\n              <div style=\"display:flex; align-items:center; justify-content:space-between; gap:8px; font-family:'IBM Plex Sans',sans-serif; font-size:13px; color:rgb(120,122,126);\">\n                <span style=\"display:inline-flex; align-items:center; gap:6px; min-width:0;\"><svg width=\"14\" height=\"14\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" style=\"flex-shrink:0;\"><path d=\"M12 2C8.13 2 5 5.13 5 9c0 4.87 7 13 7 13s7-8.13 7-13c0-3.87-3.13-7-7-7zm0 9.5A2.5 2.5 0 1 1 12 6.5a2.5 2.5 0 0 1 0 5z\" fill=\"rgb(170,172,176)\"><\u002Fpath><\u002Fsvg><span style=\"overflow:hidden; text-overflow:ellipsis; white-space:nowrap;\">{{ c.neighborhood }}<\u002Fspan><\u002Fspan>\n                <span style=\"flex-shrink:0;\">{{ c.responses }} responses<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- RIGHT COLUMN: MAP -->\n      <div style=\"position:relative; overflow:hidden; box-shadow:inset 1px 0 0 rgb(236,236,236);\">\n        <svg sc-camel-view-box=\"0 0 800 600\" sc-camel-preserve-aspect-ratio=\"xMidYMid slice\" style=\"position:absolute; inset:0; width:100%; height:100%;\">\n          <rect width=\"800\" height=\"600\" fill=\"rgb(238,237,233)\"><\u002Frect>\n          <path d=\"M 70 380 q 60 -76 184 -52 q 92 22 70 112 q -22 92 -154 82 q -132 -12 -100 -142 Z\" fill=\"rgb(209,226,201)\"><\u002Fpath>\n          <path d=\"M 568 -20 L 672 -20 L 470 620 L 358 620 Z\" fill=\"rgb(197,220,237)\"><\u002Fpath>\n          <g stroke=\"#fff\" stroke-width=\"5\" fill=\"none\" opacity=\"0.95\">\n            <path d=\"M -20 110 H 820\"><\u002Fpath><path d=\"M -20 235 H 820\"><\u002Fpath>\n            <path d=\"M -20 465 H 820\"><\u002Fpath><path d=\"M -20 560 H 820\"><\u002Fpath>\n            <path d=\"M 140 -20 V 620\"><\u002Fpath><path d=\"M 430 -20 V 620\"><\u002Fpath><path d=\"M 660 -20 V 620\"><\u002Fpath>\n          <\u002Fg>\n          <g stroke=\"rgb(248,236,192)\" stroke-width=\"11\" fill=\"none\">\n            <path d=\"M -20 340 C 200 322 500 360 820 320\"><\u002Fpath>\n            <path d=\"M 270 -20 C 250 200 310 420 286 620\"><\u002Fpath>\n          <\u002Fg>\n          <g stroke=\"rgb(244,232,188)\" stroke-width=\"5\" fill=\"none\" opacity=\"0.8\">\n            <path d=\"M -20 180 C 240 170 520 200 820 160\"><\u002Fpath>\n          <\u002Fg>\n        <\u002Fsvg>\n\n        <sc-for list=\"{{ pins }}\" as=\"p\" hint-placeholder-count=\"6\">\n          <button sc-camel-on-click=\"{{ p.select }}\" sc-camel-on-mouse-enter=\"{{ p.hover }}\" sc-camel-on-mouse-leave=\"{{ clearHover }}\" style=\"position:absolute; top:{{ p.top }}; left:{{ p.left }}; transform:translate(-50%,-100%); background:#fff; border:none; border-radius:10px; padding:6px; box-shadow:0 4px 14px rgba(0,0,0,0.16); cursor:pointer; display:flex; align-items:center; gap:8px; animation:lcPin .3s cubic-bezier(0.2,0,0.1,1); opacity:{{ p.opacity }}; z-index:{{ p.z }};\">\n            <div style=\"position:relative; width:34px; height:34px; border-radius:7px; background:{{ p.color }}; flex-shrink:0; box-shadow:{{ p.ring }}; display:flex; align-items:center; justify-content:center; color:#fff; font-family:'IBM Plex Mono',monospace; font-size:13px; font-weight:600;\">{{ p.count }}<\u002Fdiv>\n            <sc-if value=\"{{ showLabels }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"display:flex; flex-direction:column; gap:1px; padding-right:6px; text-align:left;\">\n                <span style=\"font-family:'IBM Plex Sans',sans-serif; font-size:13px; font-weight:600; color:rgb(15,15,15);\">{{ p.name }}<\u002Fspan>\n                <span style=\"font-family:'IBM Plex Mono',monospace; font-size:10px; color:rgb(140,142,148);\">{{ p.countLabel }} · {{ p.responses }} responses<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <span style=\"position:absolute; bottom:-7px; left:24px; width:14px; height:14px; background:#fff; transform:rotate(45deg); box-shadow:3px 3px 6px rgba(0,0,0,0.08);\"><\u002Fspan>\n          <\u002Fbutton>\n        <\u002Fsc-for>\n\n        <div style=\"position:absolute; bottom:16px; right:16px; display:flex; flex-direction:column; background:#fff; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,0.12); overflow:hidden;\">\n          <div style=\"width:34px; height:34px; display:flex; align-items:center; justify-content:center; font-size:18px; color:rgb(80,80,84); box-shadow:inset 0 -1px 0 rgb(236,236,236);\">+<\u002Fdiv>\n          <div style=\"width:34px; height:34px; display:flex; align-items:center; justify-content:center; font-size:18px; color:rgb(80,80,84);\">−<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ============ SCREEN: THREAD ============ -->\n    <sc-if value=\"{{ isThread }}\" hint-placeholder-val=\"{{ false }}\">\n    <div class=\"lc-screen\" data-screen-label=\"Conversation\">\n      <!-- jasper header band -->\n      <div style=\"background:rgb(254,247,242); box-shadow:inset 0 -1px 0 rgb(241,228,219); padding:24px 40px;\">\n        <div style=\"max-width:1080px; margin:0 auto;\">\n          <button sc-camel-on-click=\"{{ goBrowse }}\" style=\"display:inline-flex; align-items:center; gap:6px; background:none; border:none; cursor:pointer; padding:0 0 14px; font-family:'IBM Plex Mono',monospace; font-size:12px; color:rgb(101,103,107);\"><svg width=\"14\" height=\"14\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\"><path d=\"M14 6l-6 6 6 6\" stroke=\"currentColor\" stroke-width=\"1.8\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>All {{ query }} conversations<\u002Fbutton>\n          <div style=\"display:flex; align-items:flex-start; justify-content:space-between; gap:24px;\">\n            <div>\n              <div style=\"display:flex; gap:6px; margin-bottom:12px;\">\n                <span style=\"display:inline-flex; align-items:center; gap:5px; background:#fff; box-shadow:inset 0 0 0 1px rgb(238,225,216); border-radius:100px; padding:4px 10px; font-family:'IBM Plex Mono',monospace; font-size:11px;\"><svg width=\"11\" height=\"11\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\"><path d=\"M12 2C8.13 2 5 5.13 5 9c0 4.87 7 13 7 13s7-8.13 7-13c0-3.87-3.13-7-7-7z\" fill=\"rgb(90,30,245)\"><\u002Fpath><\u002Fsvg>Local<\u002Fspan>\n                <span style=\"display:inline-flex; align-items:center; background:#fff; box-shadow:inset 0 0 0 1px rgb(238,225,216); border-radius:100px; padding:4px 10px; font-family:'IBM Plex Mono',monospace; font-size:11px;\">{{ activeConv.neighborhood }}, Toronto<\u002Fspan>\n              <\u002Fdiv>\n              <h1 style=\"font-family:'DM Sans',sans-serif; font-weight:600; font-size:32px; line-height:1.12; letter-spacing:-0.015em; margin:0;\">{{ activeConv.title }}<\u002Fh1>\n            <\u002Fdiv>\n            <div style=\"display:flex; align-items:center; gap:8px; flex-shrink:0; padding-top:6px;\">\n              <svg width=\"16\" height=\"16\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\"><circle cx=\"9\" cy=\"8\" r=\"3\" stroke=\"rgb(101,103,107)\" stroke-width=\"1.6\"><\u002Fcircle><path d=\"M3 19c0-3.3 2.7-6 6-6s6 2.7 6 6\" stroke=\"rgb(101,103,107)\" stroke-width=\"1.6\" fill=\"none\"><\u002Fpath><circle cx=\"17\" cy=\"9\" r=\"2.3\" stroke=\"rgb(101,103,107)\" stroke-width=\"1.6\"><\u002Fcircle><path d=\"M15.5 13.4c2.4.5 4.5 2.4 4.5 5.6\" stroke=\"rgb(101,103,107)\" stroke-width=\"1.6\" fill=\"none\"><\u002Fpath><\u002Fsvg>\n              <span style=\"font-family:'IBM Plex Mono',monospace; font-size:13px; color:rgb(101,103,107);\">{{ activeConv.participants }} participants<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"max-width:1080px; margin:0 auto; padding:32px 40px 96px; display:grid; grid-template-columns:1fr 312px; gap:40px; align-items:start;\">\n        <!-- main column -->\n        <div style=\"display:flex; flex-direction:column; gap:24px;\">\n          <!-- optional opinion slider -->\n          <sc-if value=\"{{ showSlider }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"background:#fff; border-radius:12px; box-shadow:inset 0 0 0 1px rgb(232,232,232); padding:18px; display:flex; flex-direction:column; gap:12px;\">\n              <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:0.04em; text-transform:uppercase; color:rgb(101,103,107);\">Slide to respond<\u002Fspan>\n              <input type=\"range\" min=\"0\" max=\"100\" value=\"{{ sliderVal }}\" sc-camel-on-input=\"{{ setSlider }}\" class=\"lc-range\">\n              <div style=\"display:flex; justify-content:space-between; font-family:'IBM Plex Mono',monospace; font-size:11px; color:rgb(140,142,148);\"><span>Close it<\u002Fspan><span>It's complicated<\u002Fspan><span>Save it<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- composer -->\n          <div style=\"display:flex; flex-direction:column; gap:10px;\">\n            <div style=\"display:flex; align-items:center; gap:12px; background:#fff; border-radius:100px; box-shadow:inset 0 0 0 1px rgb(228,228,228); padding:10px 16px;\">\n              <div style=\"width:30px; height:30px; border-radius:50%; background:rgb(101,103,107); color:#fff; font-size:11px; font-weight:600; display:flex; align-items:center; justify-content:center; flex-shrink:0;\">MP<\u002Fdiv>\n              <input value=\"{{ composer }}\" sc-camel-on-change=\"{{ setComposer }}\" placeholder=\"Share your thoughts…\" style=\"flex:1; border:none; outline:none; background:transparent; font-size:15px; color:rgb(15,15,15);\">\n              <svg width=\"17\" height=\"17\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\"><path d=\"M4 20h4l10-10-4-4L4 16v4z\" stroke=\"rgb(140,142,148)\" stroke-width=\"1.6\" fill=\"none\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n            <\u002Fdiv>\n            <sc-if value=\"{{ hasComposerText }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"display:flex; align-items:center; gap:10px; justify-content:flex-end;\">\n                <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:rgb(140,142,148);\">{{ composerCount }} / 1000<\u002Fspan>\n                <button sc-camel-on-click=\"{{ postComment }}\" style=\"background:rgb(15,15,15); color:#fff; border:none; border-radius:8px; padding:9px 20px; font-family:'IBM Plex Mono',monospace; font-size:13px; cursor:pointer;\">Post<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n\n          <!-- sort -->\n          <div style=\"display:flex; align-items:center; gap:8px;\">\n            <span style=\"font-family:'IBM Plex Mono',monospace; font-size:13px; font-weight:500; flex:1;\">{{ responseTotal }} responses<\u002Fspan>\n            <sc-for list=\"{{ sortOptions }}\" as=\"s\" hint-placeholder-count=\"3\">\n              <button sc-camel-on-click=\"{{ s.pick }}\" style=\"background:{{ s.bg }}; color:{{ s.fg }}; border:none; border-radius:8px; padding:7px 13px; font-family:'IBM Plex Mono',monospace; font-size:12px; cursor:pointer;\">{{ s.label }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <!-- comments -->\n          <div style=\"display:flex; flex-direction:column; gap:14px;\">\n            <sc-for list=\"{{ activeComments }}\" as=\"cm\" hint-placeholder-count=\"3\">\n              <div style=\"display:flex; flex-direction:column; gap:12px; padding:20px 2px; box-shadow:inset 0 -1px 0 rgb(235,235,235);\">\n                <sc-if value=\"{{ cm.pinned }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"display:flex; align-items:center; gap:6px; font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.05em; text-transform:uppercase; color:rgb(101,103,107);\"><span style=\"width:5px; height:5px; border-radius:50%; background:rgb(90,30,245);\"><\u002Fspan>Pinned by moderator<\u002Fdiv>\n                <\u002Fsc-if>\n                <div style=\"display:flex; align-items:flex-start; gap:13px;\">\n                  <div style=\"position:relative; flex-shrink:0;\">\n                    <div style=\"width:42px; height:42px; border-radius:50%; background:{{ cm.avatarColor }}; color:#fff; font-size:14px; font-weight:600; display:flex; align-items:center; justify-content:center;\">{{ cm.initials }}<\u002Fdiv>\n                    <sc-if value=\"{{ cm.isExpert }}\" hint-placeholder-val=\"{{ false }}\">\n                      <div style=\"position:absolute; bottom:-2px; right:-3px; width:17px; height:17px; border-radius:50%; background:rgb(216,35,90); box-shadow:0 0 0 2px #fff; display:flex; align-items:center; justify-content:center;\"><svg width=\"9\" height=\"9\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\"><path d=\"M12 5v14M5 12h14\" stroke=\"#fff\" stroke-width=\"3.4\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n                    <\u002Fsc-if>\n                  <\u002Fdiv>\n                  <div style=\"flex:1; min-width:0; padding-top:1px;\">\n                    <div style=\"display:flex; align-items:center; gap:9px;\">\n                      <span style=\"font-size:16px; font-weight:700; color:rgb(20,20,20);\">{{ cm.name }}<\u002Fspan>\n                      <span style=\"background:{{ cm.roleBg }}; color:{{ cm.roleFg }}; border-radius:100px; padding:2px 9px; font-family:'IBM Plex Mono',monospace; font-size:10px;\">{{ cm.role }}<\u002Fspan>\n                    <\u002Fdiv>\n                    <div style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; color:rgb(140,142,148); margin-top:2px;\">{{ cm.meta }}<\u002Fdiv>\n                  <\u002Fdiv>\n                  <button style=\"background:none; border:none; cursor:pointer; padding:4px; color:rgb(140,142,148); flex-shrink:0;\"><svg width=\"20\" height=\"20\" sc-camel-view-box=\"0 0 24 24\" fill=\"currentColor\"><circle cx=\"5\" cy=\"12\" r=\"1.7\"><\u002Fcircle><circle cx=\"12\" cy=\"12\" r=\"1.7\"><\u002Fcircle><circle cx=\"19\" cy=\"12\" r=\"1.7\"><\u002Fcircle><\u002Fsvg><\u002Fbutton>\n                <\u002Fdiv>\n                <p style=\"margin:0; font-size:16px; line-height:1.55; color:rgb(28,28,32);\">{{ cm.body }}<sc-if value=\"{{ cm.clipped }}\" hint-placeholder-val=\"{{ false }}\"><span sc-camel-on-click=\"{{ cm.expand }}\" style=\"color:rgb(15,15,15); text-decoration:underline; cursor:pointer; margin-left:4px;\">Read more<\u002Fspan><\u002Fsc-if><\u002Fp>\n                <div style=\"display:flex; align-items:center; gap:26px; margin-top:2px;\">\n                  <button style=\"display:inline-flex; align-items:center; gap:8px; background:none; border:none; cursor:pointer; padding:0; font-family:'IBM Plex Mono',monospace; font-size:13px; font-weight:500; color:rgb(80,82,86);\"><svg width=\"17\" height=\"17\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\"><path d=\"M10 9V5l-7 7 7 7v-4c5 0 8 1.5 10 5 0-7-4-11-10-11z\" stroke=\"currentColor\" stroke-width=\"1.6\" fill=\"none\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>Reply<\u002Fbutton>\n                  <button sc-camel-on-click=\"{{ cm.toggle }}\" style=\"display:inline-flex; align-items:center; gap:8px; background:none; border:none; cursor:pointer; padding:0; font-family:'IBM Plex Mono',monospace; font-size:13px; font-weight:500; color:{{ cm.reactFg }};\"><span style=\"font-size:15px;\">{{ cm.reactIcon }}<\u002Fspan>{{ cm.reactLabel }}<\u002Fbutton>\n                  <div style=\"margin-left:auto; display:inline-flex; align-items:center; gap:6px; background:{{ cm.pillBg }}; border-radius:100px; padding:4px 11px;\"><span style=\"font-size:13px;\">❤️<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace; font-size:13px; font-weight:600; color:{{ cm.pillFg }};\">{{ cm.count }}<\u002Fspan><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n            <button style=\"align-self:center; display:inline-flex; align-items:center; gap:7px; background:rgb(15,15,15); color:#fff; border:none; border-radius:8px; padding:10px 18px; font-family:'IBM Plex Mono',monospace; font-size:13px; cursor:pointer; margin-top:14px;\">Show more responses<svg width=\"14\" height=\"14\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\"><path d=\"M6 9l6 6 6-6\" stroke=\"#fff\" stroke-width=\"1.8\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n          <\u002Fdiv>\n\n          <!-- RELATED CONVERSATIONS MODULE (design-system teal promo cards) -->\n          <div style=\"display:flex; flex-direction:column; gap:16px; margin-top:4px;\">\n            <h3 style=\"font-family:'IBM Plex Sans',sans-serif; font-weight:700; font-size:20px; letter-spacing:-0.01em; margin:0; color:rgb(15,15,15);\">Related conversations<\u002Fh3>\n            <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:16px;\">\n              <sc-for list=\"{{ relatedConvs }}\" as=\"rc\" hint-placeholder-count=\"2\">\n                <button sc-camel-on-click=\"{{ rc.open }}\" style=\"text-align:left; background:rgb(5,130,135); border:none; border-radius:16px; padding:20px; color:#fff; cursor:pointer; display:flex; flex-direction:column; gap:9px; min-height:158px;\" style-hover=\"background:rgb(4,116,120);\">\n                  <span style=\"align-self:flex-start; display:inline-flex; align-items:center; background:rgba(255,255,255,0.16); border-radius:100px; padding:3px 10px; font-family:'IBM Plex Mono',monospace; font-size:10px;\">{{ rc.neighborhood }}<\u002Fspan>\n                  <div style=\"font-family:'IBM Plex Sans',sans-serif; font-weight:600; font-size:18px; line-height:1.18;\">{{ rc.title }}<\u002Fdiv>\n                  <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; opacity:0.85;\">{{ rc.participants }} participants<\u002Fdiv>\n                  <div style=\"margin-top:auto; display:inline-flex; align-items:center; gap:6px; font-family:'IBM Plex Mono',monospace; font-size:12px;\">Open conversation<svg width=\"14\" height=\"14\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\"><path d=\"M5 12h14M13 6l6 6-6 6\" stroke=\"#fff\" stroke-width=\"1.8\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n                <\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- CONTEXT ENTRY POINTS MODULE (design-system jasper \"Learn more\" list) -->\n          <div style=\"background:rgb(254,247,242); border-radius:16px; padding:22px 24px 12px; display:flex; flex-direction:column;\">\n            <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:0.05em; text-transform:uppercase; color:rgb(101,103,107);\">Get the context<\u002Fspan>\n            <p style=\"font-family:'IBM Plex Sans',sans-serif; font-size:14px; color:rgb(122,110,102); margin:6px 0 4px;\">Reporting and background behind this conversation<\u002Fp>\n            <sc-for list=\"{{ contextItems }}\" as=\"ci\" hint-placeholder-count=\"2\">\n              <a href=\"#\" style=\"display:flex; gap:14px; align-items:flex-start; padding:14px 0; box-shadow:{{ ci.divider }}; text-decoration:none;\">\n                <span style=\"flex-shrink:0; width:36px; height:36px; border-radius:8px; background:#fff; box-shadow:inset 0 0 0 1px rgb(240,228,220); display:flex; align-items:center; justify-content:center; color:rgb(90,30,245);\">\n                  <sc-if value=\"{{ ci.isArticle }}\" hint-placeholder-val=\"{{ true }}\"><svg width=\"17\" height=\"17\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\"><rect x=\"5\" y=\"3\" width=\"14\" height=\"18\" rx=\"1.5\" stroke=\"currentColor\" stroke-width=\"1.6\"><\u002Frect><path d=\"M8.5 8h7M8.5 12h7M8.5 16h4\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fsc-if>\n                  <sc-if value=\"{{ ci.isVideo }}\" hint-placeholder-val=\"{{ false }}\"><svg width=\"17\" height=\"17\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\"><rect x=\"3\" y=\"5\" width=\"18\" height=\"14\" rx=\"2.5\" stroke=\"currentColor\" stroke-width=\"1.6\"><\u002Frect><path d=\"M10 9.4l4.6 2.6L10 14.6z\" fill=\"currentColor\"><\u002Fpath><\u002Fsvg><\u002Fsc-if>\n                  <sc-if value=\"{{ ci.isAudio }}\" hint-placeholder-val=\"{{ false }}\"><svg width=\"17\" height=\"17\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\"><path d=\"M5 14a7 7 0 0114 0\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\"><\u002Fpath><rect x=\"3.5\" y=\"13\" width=\"4\" height=\"6\" rx=\"2\" fill=\"currentColor\"><\u002Frect><rect x=\"16.5\" y=\"13\" width=\"4\" height=\"6\" rx=\"2\" fill=\"currentColor\"><\u002Frect><\u002Fsvg><\u002Fsc-if>\n                <\u002Fspan>\n                <div style=\"flex:1; min-width:0;\">\n                  <div style=\"font-family:'IBM Plex Sans',sans-serif; font-size:15px; font-weight:600; line-height:1.3; color:rgb(20,20,20);\">{{ ci.title }}<\u002Fdiv>\n                  <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:rgb(150,140,132); margin-top:3px;\">{{ ci.kindLabel }} · {{ ci.date }}<\u002Fdiv>\n                <\u002Fdiv>\n                <svg width=\"16\" height=\"16\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" style=\"flex-shrink:0; margin-top:2px;\"><path d=\"M7 17L17 7M17 7H8.5M17 7v8.5\" stroke=\"rgb(160,148,140)\" stroke-width=\"1.6\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n              <\u002Fa>\n            <\u002Fsc-for>\n            <button style=\"align-self:flex-start; display:inline-flex; align-items:center; gap:7px; background:none; border:none; cursor:pointer; padding:12px 0 8px; font-family:'IBM Plex Mono',monospace; font-size:13px; color:rgb(90,30,245);\"><svg width=\"14\" height=\"14\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\"><path d=\"M12 5v14M5 12h14\" stroke=\"rgb(90,30,245)\" stroke-width=\"1.8\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>Show more<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- sidebar -->\n        <div style=\"display:flex; flex-direction:column; gap:20px; position:sticky; top:144px;\">\n          <div style=\"background:#fff; border-radius:16px; box-shadow:inset 0 0 0 1px rgb(233,233,233); padding:18px;\">\n            <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:rgb(101,103,107); margin-bottom:12px;\">Located in: <span style=\"color:rgb(15,15,15);\">{{ activeConv.neighborhood }}, Toronto<\u002Fspan><\u002Fdiv>\n            <div style=\"position:relative; height:150px; border-radius:10px; overflow:hidden; box-shadow:inset 0 0 0 1px rgb(232,232,232);\">\n              <svg sc-camel-view-box=\"0 0 300 200\" sc-camel-preserve-aspect-ratio=\"xMidYMid slice\" style=\"position:absolute; inset:0; width:100%; height:100%;\">\n                <rect width=\"300\" height=\"200\" fill=\"rgb(238,237,233)\"><\u002Frect>\n                <path d=\"M 210 -10 L 250 -10 L 170 210 L 130 210 Z\" fill=\"rgb(197,220,237)\"><\u002Fpath>\n                <g stroke=\"#fff\" stroke-width=\"4\" fill=\"none\"><path d=\"M -10 70 H 310\"><\u002Fpath><path d=\"M -10 140 H 310\"><\u002Fpath><path d=\"M 90 -10 V 210\"><\u002Fpath><path d=\"M 220 -10 V 210\"><\u002Fpath><\u002Fg>\n                <g stroke=\"rgb(248,236,192)\" stroke-width=\"7\" fill=\"none\"><path d=\"M -10 110 C 80 100 200 120 310 100\"><\u002Fpath><\u002Fg>\n              <\u002Fsvg>\n              <div style=\"position:absolute; top:50%; left:50%; transform:translate(-50%,-100%);\">\n                <svg width=\"30\" height=\"30\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\"><path d=\"M12 2C8.13 2 5 5.13 5 9c0 4.87 7 13 7 13s7-8.13 7-13c0-3.87-3.13-7-7-7z\" fill=\"rgb(90,30,245)\"><\u002Fpath><circle cx=\"12\" cy=\"9\" r=\"2.5\" fill=\"#fff\"><\u002Fcircle><\u002Fsvg>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#fff; border-radius:16px; box-shadow:inset 0 0 0 1px rgb(233,233,233); padding:18px 18px 6px; display:flex; flex-direction:column;\">\n            <span style=\"font-size:13px; color:rgb(101,103,107); margin-bottom:6px;\">With editorial experts<\u002Fspan>\n            <sc-for list=\"{{ experts }}\" as=\"e\" hint-placeholder-count=\"3\">\n              <div style=\"display:flex; align-items:center; gap:12px; padding:13px 0; box-shadow:{{ e.divider }};\">\n                <div style=\"position:relative; flex-shrink:0;\">\n                  <div style=\"width:38px; height:38px; border-radius:50%; background:{{ e.color }}; color:#fff; font-size:13px; font-weight:600; display:flex; align-items:center; justify-content:center;\">{{ e.initials }}<\u002Fdiv>\n                  <div style=\"position:absolute; bottom:-2px; right:-3px; width:17px; height:17px; border-radius:50%; background:rgb(216,35,90); box-shadow:0 0 0 2px #fff; display:flex; align-items:center; justify-content:center;\"><svg width=\"9\" height=\"9\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\"><path d=\"M12 5v14M5 12h14\" stroke=\"#fff\" stroke-width=\"3.4\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n                <\u002Fdiv>\n                <div>\n                  <div style=\"font-size:15px; font-weight:700; color:rgb(20,20,20);\">{{ e.name }}<\u002Fdiv>\n                  <span style=\"display:inline-block; background:rgb(252,228,236); color:rgb(198,32,84); border-radius:100px; padding:2px 10px; font-family:'IBM Plex Mono',monospace; font-size:11px; margin-top:3px;\">Journalist<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fmain>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: { &quot;width&quot;: 1440, &quot;height&quot;: 900 },\n  &quot;startScreen&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;article&quot;, &quot;browse&quot;, &quot;thread&quot;], &quot;default&quot;: &quot;article&quot;, &quot;tsType&quot;: &quot;string&quot; },\n  &quot;teaserStyle&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;conversation&quot;, &quot;discover&quot;], &quot;default&quot;: &quot;conversation&quot;, &quot;tsType&quot;: &quot;string&quot; },\n  &quot;showOpinionSlider&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: false, &quot;tsType&quot;: &quot;boolean&quot; },\n  &quot;pinLabels&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot; }\n}\">\nclass Component extends DCLogic {\n  // Map pins are NEIGHBOURHOOD CLUSTERS. Clicking one drills the list down to\n  // that area; individual conversations open only from the list cards.\n  neighborhoods = [\n    { name:'Kensington Market', color:'rgb(245,130,35)', top:'37%', left:'25%' },\n    { name:'Riverdale',         color:'rgb(5,130,135)',  top:'46%', left:'40%' },\n    { name:'Trinity-Bellwoods', color:'rgb(90,30,245)',  top:'63%', left:'21%' },\n    { name:'The Annex',         color:'rgb(0,150,160)',  top:'29%', left:'47%' },\n    { name:'Leslieville',       color:'rgb(216,35,90)',  top:'70%', left:'58%' },\n    { name:'Riverside',         color:'rgb(120,90,200)', top:'56%', left:'68%' },\n  ];\n\n  conversations = [\n    { id:'rec-center',    title:'How can we save the Riverdale rec centre?',          neighborhood:'Riverdale',         tag:'Local services', responses:102, participants:284 },\n    { id:'broadview',     title:'Is Broadview safe enough for kids walking to school?', neighborhood:'Riverdale',       tag:'Safety',         responses:47,  participants:96 },\n    { id:'fridge',        title:'Where should the new community fridge go?',           neighborhood:'Kensington Market', tag:'Mutual aid',     responses:41,  participants:63 },\n    { id:'car-free',      title:'Keep Kensington car-free on summer weekends?',        neighborhood:'Kensington Market', tag:'Streets',        responses:88,  participants:174 },\n    { id:'market-litter', title:'How do we fix the weekend litter problem?',           neighborhood:'Kensington Market', tag:'Cleanliness',    responses:29,  participants:52 },\n    { id:'bike-lane',     title:'Should Dundas West get a protected bike lane?',       neighborhood:'Trinity-Bellwoods', tag:'Transit',        responses:78,  participants:151 },\n    { id:'dog-hours',     title:'Should the dog bowl get off-leash evening hours?',    neighborhood:'Trinity-Bellwoods', tag:'Parks',          responses:36,  participants:71 },\n    { id:'cycle-track',   title:'Keep the Bloor cycle track through winter?',          neighborhood:'The Annex',         tag:'Transit',        responses:64,  participants:120 },\n    { id:'ontario-line',  title:'Is the Ontario Line worth the Queen St disruption?',  neighborhood:'Leslieville',       tag:'Transit',        responses:213, participants:402 },\n    { id:'empty-lot',     title:'What should replace the empty lot on Gerrard?',       neighborhood:'Riverside',         tag:'Development',    responses:33,  participants:51 },\n  ];\n\n  participantsByConv = (() => {\n    const m = this.seedComments();\n    const out = {};\n    Object.keys(m).forEach(k => { out[k] = m[k].length + m[k].reduce((a, c) => a + c.count, 0); });\n    return out;\n  })();\n\n  contextByConv = {\n    'rec-center': [\n      { kind:'article', title:'City report: Riverdale centre needs $14M in repairs', date:'Oct 9, 2024' },\n      { kind:'article', title:'What losing a rec centre does to a neighbourhood', date:'Oct 2, 2024' },\n    ],\n    'broadview': [\n      { kind:'article', title:'Broadview Ave sees third near-miss this year', date:'Sep 28, 2024' },\n      { kind:'video', title:'Watch: the morning school-run crossing', date:'Sep 12, 2024' },\n    ],\n    'fridge': [\n      { kind:'article', title:'Kensington\\u2019s community fridge feeds 200 a week', date:'Oct 5, 2024' },\n      { kind:'audio', title:'The volunteers keeping the fridge stocked', date:'Sep 20, 2024' },\n    ],\n    'car-free': [\n      { kind:'video', title:'Pedestrian Sundays return to Kensington Market', date:'Jul 30, 2024' },\n      { kind:'article', title:'Do car-free streets help local shops?', date:'Aug 14, 2024' },\n    ],\n    'market-litter': [\n      { kind:'article', title:'Weekend crowds stretch Kensington cleanup crews', date:'Sep 15, 2024' },\n      { kind:'article', title:'Inside the market\\u2019s volunteer clean team', date:'Aug 22, 2024' },\n    ],\n    'bike-lane': [\n      { kind:'article', title:'City proposes protected lane on Dundas West', date:'Oct 1, 2024' },\n      { kind:'video', title:'Bloor\\u2019s bike lane: what the data shows', date:'Sep 5, 2024' },\n    ],\n    'dog-hours': [\n      { kind:'article', title:'Dog owners petition for evening off-leash hours', date:'Sep 25, 2024' },\n      { kind:'audio', title:'Sharing the park: dogs, kids and everyone else', date:'Aug 30, 2024' },\n    ],\n    'cycle-track': [\n      { kind:'article', title:'Should Toronto plow its bike lanes first?', date:'Oct 3, 2024' },\n      { kind:'video', title:'Winter cycling is growing in the Annex', date:'Sep 18, 2024' },\n    ],\n    'ontario-line': [\n      { kind:'video', title:'Ontario Line work to close Queen for years', date:'Oct 7, 2024' },\n      { kind:'article', title:'Metrolinx explains the Queen St detour plan', date:'Sep 22, 2024' },\n    ],\n    'empty-lot': [\n      { kind:'article', title:'Developer pitches condos for vacant Gerrard lot', date:'Oct 4, 2024' },\n      { kind:'article', title:'Residents want green space, not another tower', date:'Sep 10, 2024' },\n    ],\n  };\n\n  colorOf(name) { const n = this.neighborhoods.find(h => h.name === name); return n ? n.color : 'rgb(101,103,107)'; }\n\n  experts = [\n    { name:'Alexis De Lancer', initials:'AD', color:'rgb(5,130,135)' },\n    { name:'Jean-Francois Theriault', initials:'JT', color:'rgb(90,30,245)' },\n    { name:'Laura Fraser', initials:'LF', color:'rgb(216,35,90)' },\n  ];\n\n  sortOptions = ['Best', 'Top', 'Most recent'];\n\n  roleStyle(role) {\n    if (role === 'Journalist') return { roleBg:'rgb(252,228,236)', roleFg:'rgb(198,32,84)' };\n    if (role === 'You') return { roleBg:'rgb(224,246,239)', roleFg:'rgb(0,140,108)' };\n    return { roleBg:'rgb(244,244,244)', roleFg:'rgb(101,103,107)' };\n  }\n\n  seedComments() {\n    const palette = ['rgb(5,130,135)','rgb(216,35,90)','rgb(90,30,245)','rgb(245,130,35)','rgb(0,150,160)'];\n    const out = {};\n    out['rec-center'] = [\n      { id:'c1', name:'Alexander De Lancer', role:'Journalist', time:'2 hours ago', pinned:true, from:'Riverdale, Toronto', avatarColor:'rgb(5,130,135)', initials:'AD', count:100, text:'My heart breaks for the two elderly residents who rely on this centre for their only warm meal of the week — the closure plan barely mentions them. Where is the city\\u2019s relocation plan?' },\n      { id:'c2', name:'Michael Hill', role:'Resident', time:'2 hours ago', avatarColor:'rgb(216,35,90)', initials:'MH', count:48, text:'Agreed. My kids learned to swim in that pool. We should be expanding it, not boarding it up.' },\n      { id:'c3', name:'Priya Anand', role:'Resident', time:'1 hour ago', avatarColor:'rgb(90,30,245)', initials:'PA', count:31, text:'Has anyone seen the actual maintenance numbers? If the roof really is failing, a patch job just kicks the problem a few years down the road.' },\n    ];\n    this.conversations.forEach((c, i) => {\n      if (c.id === 'rec-center') return;\n      out[c.id] = [\n        { id:c.id+'-a', name:'Sofia Marwan', role:'Resident', time:'3 hours ago', avatarColor:palette[i%palette.length], initials:'SM', count:27, text:'I walk past here every day with my kids. Whatever we decide, it has to work for the people who actually live on this block.' },\n        { id:c.id+'-b', name:'Daniel Cho', role:'Local business', time:'1 hour ago', avatarColor:palette[(i+2)%palette.length], initials:'DC', count:14, text:'Happy to host a neighbourhood meeting at the shop if anyone wants to talk through the options in person.' },\n      ];\n    });\n    return out;\n  }\n\n  state = {\n    screen: this.props.startScreen || 'article',\n    activeConvId: 'rec-center',\n    query: 'Toronto',\n    sort: 'Best',\n    composer: '',\n    sliderVal: 60,\n    hoverId: null,\n    selectedHood: null,\n    selectedTag: null,\n    reacted: {},\n    expanded: {},\n    commentsByConv: this.seedComments(),\n  };\n\n  expand = (id) => this.setState(s => ({ expanded: { ...s.expanded, [id]: true } }));\n  pickTag = (t) => this.setState(s => ({ selectedTag: (t === 'All' || s.selectedTag === t) ? null : t }));\n\n  goArticle = () => this.setState({ screen:'article' });\n  goBrowse = () => this.setState({ screen:'browse', selectedHood:null });\n  filterHood = (name) => this.setState(s => ({ screen:'browse', selectedHood: s.selectedHood === name ? null : name }));\n  clearFilter = () => this.setState({ selectedHood:null });\n  openThread = (id) => this.setState({ screen:'thread', activeConvId:id, composer:'' });\n  openRecCenter = () => this.openThread('rec-center');\n  openOntarioLine = () => this.openThread('ontario-line');\n  setQuery = (e) => this.setState({ query: e.target.value });\n  setComposer = (e) => this.setState({ composer: e.target.value });\n  setSlider = (e) => this.setState({ sliderVal: +e.target.value });\n  pickSort = (s) => this.setState({ sort: s });\n  setHover = (id) => this.setState({ hoverId: id });\n  clearHover = () => this.setState({ hoverId: null });\n  toggleReact = (id) => this.setState(s => ({ reacted: { ...s.reacted, [id]: !s.reacted[id] } }));\n\n  postComment = () => {\n    const t = this.state.composer.trim();\n    if (!t) return;\n    this.setState(s => {\n      const list = s.commentsByConv[s.activeConvId] || [];\n      const nc = { id:'u'+Date.now(), name:'Matt Pearson', role:'You', time:'Just now', avatarColor:'rgb(101,103,107)', initials:'MP', count:0, text:t };\n      return { commentsByConv: { ...s.commentsByConv, [s.activeConvId]: [...list, nc] }, composer:'' };\n    });\n  };\n\n  renderVals() {\n    const s = this.state;\n    const showLabels = this.props.pinLabels ?? true;\n    const activeConvRaw = this.conversations.find(c => c.id === s.activeConvId) || this.conversations[0];\n    const activeConv = { ...activeConvRaw, participants: this.participantsByConv[activeConvRaw.id] ?? activeConvRaw.participants };\n    const rawComments = s.commentsByConv[s.activeConvId] || [];\n\n    // Context entry points (design-system \"Learn more\" list) for this conversation.\n    const kindLabels = { article:'Article', video:'Video', audio:'Audio' };\n    const contextItems = (this.contextByConv[activeConv.id] || []).map((c, i) => ({\n      ...c,\n      kindLabel: kindLabels[c.kind] || 'Article',\n      isArticle: c.kind === 'article',\n      isVideo: c.kind === 'video',\n      isAudio: c.kind === 'audio',\n      divider: i === 0 ? 'none' : 'inset 0 1px 0 rgb(241,229,221)',\n    }));\n\n    // Related conversations (teal promo cards): prefer same neighbourhood, then same tag.\n    const relSeen = new Set([activeConv.id]);\n    const relatedConvs = [\n      ...this.conversations.filter(c => c.neighborhood === activeConv.neighborhood),\n      ...this.conversations.filter(c => c.tag === activeConv.tag),\n      ...this.conversations,\n    ].filter(c => { if (relSeen.has(c.id)) return false; relSeen.add(c.id); return true; })\n     .slice(0, 2)\n     .map(c => ({ id:c.id, title:c.title, participants:this.participantsByConv[c.id] ?? c.participants, neighborhood:c.neighborhood, open:() => this.openThread(c.id) }));\n\n    // List cards — filtered by neighbourhood cluster and/or category tag.\n    const visibleConvs = this.conversations.filter(c =>\n      (!s.selectedHood || c.neighborhood === s.selectedHood) &&\n      (!s.selectedTag || c.tag === s.selectedTag)\n    );\n    const cards = visibleConvs.map((c, i) => ({\n      ...c,\n      color: this.colorOf(c.neighborhood),\n      open: () => this.openThread(c.id),\n    }));\n\n    // Category filter chips, derived from the conversation tags.\n    const tagOrder = [];\n    this.conversations.forEach(c => { if (!tagOrder.includes(c.tag)) tagOrder.push(c.tag); });\n    const categories = ['All', ...tagOrder].map(t => {\n      const active = t === 'All' ? !s.selectedTag : s.selectedTag === t;\n      return {\n        label: t,\n        pick: () => this.pickTag(t),\n        bg: active ? 'rgb(15,15,15)' : '#fff',\n        fg: active ? '#fff' : 'rgb(40,40,44)',\n        border: active ? 'none' : 'inset 0 0 0 1px rgb(224,224,224)',\n      };\n    });\n\n\n    // Map pins — one per neighbourhood, aggregating its conversations.\n    const pins = this.neighborhoods.map((h, i) => {\n      const convs = this.conversations.filter(c => c.neighborhood === h.name);\n      const responses = convs.reduce((a, c) => a + c.responses, 0);\n      const active = s.selectedHood === h.name;\n      const dim = s.selectedHood && !active;\n      return {\n        ...h,\n        count: convs.length,\n        countLabel: convs.length === 1 ? '1 conversation' : convs.length + ' conversations',\n        responses,\n        z: active ? 40 : (s.hoverId === h.name ? 30 : 10 + i),\n        opacity: dim ? '0.45' : '1',\n        ring: active ? 'inset 0 0 0 2px rgb(15,15,15)' : 'inset 0 0 0 1px rgba(0,0,0,0.06)',\n        select: () => this.filterHood(h.name),\n        hover: () => this.setHover(h.name),\n      };\n    });\n\n    const activeComments = rawComments.map(cm => {\n      const rs = this.roleStyle(cm.role);\n      const on = !!s.reacted[cm.id];\n      const isExpanded = !!s.expanded[cm.id];\n      const long = cm.text.length > 170;\n      const clipped = long && !isExpanded;\n      const body = clipped ? cm.text.slice(0, 170).trimEnd() + '…' : cm.text;\n      return {\n        ...cm,\n        meta: cm.from ? cm.time + ' · ' + cm.from : cm.time,\n        isExpert: cm.role === 'Journalist',\n        body, clipped,\n        expand: () => this.expand(cm.id),\n        roleBg: rs.roleBg, roleFg: rs.roleFg,\n        count: cm.count + (on ? 1 : 0),\n        toggle: () => this.toggleReact(cm.id),\n        reactIcon: on ? '❤️' : '🤍',\n        reactLabel: on ? 'Reacted' : 'React',\n        reactFg: on ? 'rgb(198,32,84)' : 'rgb(80,82,86)',\n        pillBg: on ? 'rgb(252,228,236)' : 'rgb(247,247,247)',\n        pillFg: on ? 'rgb(198,32,84)' : 'rgb(101,103,107)',\n      };\n    });\n\n    const sortOptions = this.sortOptions.map(label => ({\n      label,\n      pick: () => this.pickSort(label),\n      bg: s.sort === label ? 'rgb(15,15,15)' : 'rgb(247,247,247)',\n      fg: s.sort === label ? '#fff' : 'rgb(101,103,107)',\n    }));\n\n    const teaserStyle = this.props.teaserStyle ?? 'conversation';\n\n    return {\n      isArticle: s.screen === 'article',\n      isBrowse: s.screen === 'browse',\n      isThread: s.screen === 'thread',\n      teaserA: teaserStyle === 'conversation',\n      teaserB: teaserStyle === 'discover',\n      query: s.query,\n      composer: s.composer,\n      sliderVal: s.sliderVal,\n      hasComposerText: s.composer.trim().length > 0,\n      composerCount: s.composer.length,\n      showSlider: this.props.showOpinionSlider ?? false,\n      showLabels,\n      convCount: this.conversations.length,\n      cards,\n      categories,\n      pins,\n      selectedHood: s.selectedHood,\n      isFiltered: !!s.selectedHood,\n      notFiltered: !s.selectedHood,\n      filterLabel: s.selectedHood\n        ? cards.length + (cards.length === 1 ? ' conversation in ' : ' conversations in ') + s.selectedHood\n        : '',\n      browseHeading: s.selectedHood || 'Conversations near you',\n      clearFilter: this.clearFilter,\n      activeConv,\n      relatedConvs,\n      contextItems,\n      recParticipants: this.participantsByConv['rec-center'],\n      activeComments,\n      responseTotal: activeComments.length,\n      sortOptions,\n      experts: this.experts.map((e, i) => ({ ...e, divider: i === 0 ? 'none' : 'inset 0 1px 0 rgb(237,237,237)' })),\n      goArticle: this.goArticle,\n      goBrowse: this.goBrowse,\n      openRecCenter: this.openRecCenter,\n      openOntarioLine: this.openOntarioLine,\n      setQuery: this.setQuery,\n      setComposer: this.setComposer,\n      setSlider: this.setSlider,\n      postComment: this.postComment,\n      clearHover: this.clearHover,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
